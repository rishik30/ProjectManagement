<div class="page">
	<div class="section">
		<label>Machine</label>

		<select id="setupMachineSelect">
			<option value="">Loading...</option>
		</select>
	</div>

	<div class="section">
		<div class="section-title">Machine Configuration</div>

		<table id="machineConfigTable">
			<thead>
				<tr>
					<th style="width: 55%">Product</th>
					<th style="width: 25%">Mould</th>
					<th style="width: 20%">Action</th>
				</tr>
			</thead>

			<tbody>
				<tr>
					<td colspan="3" class="empty">Select a machine</td>
				</tr>
			</tbody>
		</table>
	</div>

	<div class="button-container">
		<button id="addConfigRowBtn" class="secondary-btn">+ Add Row</button>
	</div>

	<div class="button-container">
		<button id="saveConfigBtn" class="primary-btn">Save Changes</button>

		<button id="resetConfigBtn" class="secondary-btn">Reset</button>
	</div>
</div>
