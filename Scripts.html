<script>
	let machines = [];
	let operators = [];
	let currentProducts = [];
	let editMode = false;
	let editingEntryId = '';
	let setupMachines = [];
	let setupProducts = [];
	let setupConfiguration = [];

	document.addEventListener('DOMContentLoaded', initializeProductionForm);

	/**
	 * -----------------------------------------------------------
	 * Initial Load
	 * -----------------------------------------------------------
	 */
	function initializeProductionForm() {
		document.getElementById('prodDate').valueAsDate = new Date();

		loadMasters();
		initializeSearch();

		document
			.getElementById('machineSelect')
			.addEventListener('change', onMachineChange);

		document
			.getElementById('resetProductionBtn')
			.addEventListener('click', resetProductionForm);

		document
			.getElementById('submitProductionBtn')
			.addEventListener('click', submitProductionForm);

		initializeTabs();

		initializeMachineSetup();

		const pendingEdit = sessionStorage.getItem('productionEditEntry');

		if (pendingEdit) {
			sessionStorage.removeItem('productionEditEntry');

			loadProductionForEdit(JSON.parse(pendingEdit));
		}
	}

	function initializeTabs() {
		document
			.getElementById('productionTab')
			.addEventListener('click', showProductionTab);

		document
			.getElementById('machineTab')
			.addEventListener('click', showMachineTab);

		if (DEFAULT_TAB === 'machine') {
			showMachineTab();
		} else {
			showProductionTab();
		}
	}

	function showProductionTab() {
		document.getElementById('productionContent').style.display = 'block';
		document.getElementById('machineContent').style.display = 'none';

		document.getElementById('productionTab').classList.add('active-tab');
		document.getElementById('machineTab').classList.remove('active-tab');
	}

	function showMachineTab() {
		document.getElementById('productionContent').style.display = 'none';
		document.getElementById('machineContent').style.display = 'block';

		document.getElementById('machineTab').classList.add('active-tab');
		document.getElementById('productionTab').classList.remove('active-tab');
	}

	/**
	 * -----------------------------------------------------------
	 * Load Machines & Operators
	 * -----------------------------------------------------------
	 */
	function loadMasters() {
		google.script.run
			.withSuccessHandler(populateMasters)
			.getProductionFormData();
	}

	function populateMasters(data) {
		machines = data.machines;
		operators = data.operators;

		populateMachineDropdown();
		populateOperatorDropdown();
	}

	/**
	 * -----------------------------------------------------------
	 * Machine Dropdown
	 * -----------------------------------------------------------
	 */
	function populateMachineDropdown() {
		const dropdown = document.getElementById('machineSelect');

		dropdown.innerHTML = '';

		const defaultOption = document.createElement('option');

		defaultOption.value = '';

		defaultOption.textContent = 'Select Machine';

		dropdown.appendChild(defaultOption);

		machines.forEach((machine) => {
			const option = document.createElement('option');

			option.value = machine.id;

			option.textContent = machine.name;

			dropdown.appendChild(option);

			// Populating search machine dropdown
			const searchDropdown = document.getElementById('searchMachine');

			const searchOption = document.createElement('option');

			searchOption.value = machine.id;

			searchOption.textContent = machine.name;

			searchDropdown.appendChild(searchOption);
		});
	}

	/**
	 * -----------------------------------------------------------
	 * Operator Dropdown
	 * -----------------------------------------------------------
	 */
	function populateOperatorDropdown() {
		const dropdown = document.getElementById('operatorSelect');

		dropdown.innerHTML = '';

		operators.forEach((operator) => {
			const option = document.createElement('option');

			option.value = operator.id;

			option.textContent = operator.name;

			dropdown.appendChild(option);

			// Populating search operator dropdown
			const searchDropdown = document.getElementById('searchOperator');

			const searchOption = document.createElement('option');

			searchOption.value = operator.id;

			searchOption.textContent = operator.name;

			searchDropdown.appendChild(searchOption);
		});
	}

	/**
	 * -----------------------------------------------------------
	 * Machine Changed
	 * -----------------------------------------------------------
	 */
	function onMachineChange() {
		const machineId = this.value;

		if (machineId === '') {
			clearRunningProducts();

			return;
		}

		const machine = machines.find((m) => m.id === machineId);

		if (machine) {
			document.getElementById('operatorSelect').value =
				machine.defaultOperatorId;
		}

		if (editMode) {
			return;
		}

		google.script.run
			.withSuccessHandler(renderRunningProducts)
			.getMachineConfiguration(machineId);
	}

	/**
	 * -----------------------------------------------------------
	 * Running Products
	 * -----------------------------------------------------------
	 */
	function renderRunningProducts(products) {
		products = products || currentProducts || [];

		currentProducts = products;

		const tbody = document.querySelector('#runningProductsTable tbody');

		tbody.innerHTML = '';

		if (products.length === 0) {
			tbody.innerHTML = `
            <tr>
                <td colspan="2" class="empty">
                    No running products
                </td>
            </tr>
        `;

			return;
		}

		products.forEach((product) => {
			tbody.innerHTML += `
            <tr>
                <td>${product.productName}</td>
                <td>${product.mould}</td>
            </tr>
        `;
		});
	}

	function clearRunningProducts() {
		currentProducts = [];

		document.querySelector('#runningProductsTable tbody').innerHTML = `
        <tr>
            <td colspan="2" class="empty">
                Select a machine
            </td>
        </tr>
    `;
	}

	/**
	 * -----------------------------------------------------------
	 * Reset Form
	 * -----------------------------------------------------------
	 */
	function resetProductionForm() {
		document.getElementById('prodDate').valueAsDate = new Date();

		const machineSelect = document.getElementById('machineSelect');
		machineSelect.selectedIndex = 0;
		machineSelect.disabled = false;

		document.getElementById('operatorSelect').selectedIndex = 0;

		document.getElementById('bags').value = '';

		document.getElementById('rounds').value = '';

		clearRunningProducts();

		editMode = false;

		editingEntryId = '';

		document.getElementById('submitProductionBtn').textContent = 'Submit';
	}

	/**
	 * -----------------------------------------------------------
	 * Submit
	 * -----------------------------------------------------------
	 */
	function submitProductionForm(event) {
		const submitButton = event.target;

		if (submitButton.disabled) return;

		const data = buildProductionObject();

		const validation = validateProduction(data);

		if (validation !== true) {
			alert(validation);

			return;
		}

		if (editMode) {
			submitButton.disabled = true;

			google.script.run

				.withSuccessHandler(function () {
					alert('Production updated successfully.');

					editMode = false;
					editingEntryId = '';

					submitButton.disabled = false;
					submitButton.textContent = 'Submit';

					resetProductionForm();

					resetProductionForm();

					document.getElementById('searchProductionBtn').click();
				})

				.withFailureHandler(function (err) {
					submitButton.disabled = false;

					alert(err.message);
				})

				.updateProduction(editingEntryId, data);

			return;
		}

		showConfirmation(data, submitButton);
	}

	/**
	 * -----------------------------------------------------------
	 * Validation
	 * -----------------------------------------------------------
	 */
	function validateProduction(data) {
		if (data.date === '') return 'Please select Date.';

		if (data.machineId === '') return 'Please select Machine.';

		if (data.operatorId === '') return 'Please select Operator.';

		if (data.bags === '' || isNaN(data.bags)) return 'Please enter Bags.';

		if (data.rounds === '' || isNaN(data.rounds)) return 'Please enter Rounds.';

		if (data.products.length === 0)
			return 'Selected machine has no running products.';

		return true;
	}

	/**
	 * -----------------------------------------------------------
	 * Build JSON
	 * -----------------------------------------------------------
	 */
	function buildProductionObject() {
		const machineId = document.getElementById('machineSelect').value;

		const machine = machines.find((m) => m.id === machineId);

		const operatorId = document.getElementById('operatorSelect').value;

		const operator = operators.find((o) => o.id === operatorId);

		return {
			date: document.getElementById('prodDate').value,

			machineId: machine.id,

			machineName: machine.name,

			operatorId: operator.id,

			operatorName: operator.name,

			bags: Number(document.getElementById('bags').value),

			rounds: Number(document.getElementById('rounds').value),

			products: currentProducts,
		};
	}

	function loadProductionForEdit(entry) {
		editMode = true;

		editingEntryId = entry.header.entryId;

		// Populate form

		document.getElementById('prodDate').value = new Date(entry.header.date)
			.toISOString()
			.split('T')[0];

		const machineSelect = document.getElementById('machineSelect');
		machineSelect.value = entry.header.machineId;
		machineSelect.disabled = true;

		document.getElementById('operatorSelect').value = entry.header.operatorId;

		document.getElementById('bags').value = entry.header.bags;

		document.getElementById('rounds').value = entry.header.rounds;

		currentProducts = entry.details.map(function (item) {
			return {
				productId: item.productId,

				productName: item.productName,

				mould: Number(item.mould),

				pieces: Number(item.pieces),
			};
		});

		renderRunningProducts(currentProducts);

		document.getElementById('submitProductionBtn').textContent = 'Update Entry';

		document.getElementById('production-page').scrollIntoView({
			behavior: 'smooth',
			block: 'start',
		});
	}

	function initializeSearch() {
		document
			.getElementById('searchProductionBtn')
			.addEventListener('click', searchProduction);

		document
			.getElementById('clearSearchBtn')
			.addEventListener('click', clearSearch);
	}

	function searchProduction() {
		const criteria = {
			entryId: document.getElementById('searchEntryId').value.trim(),
			date: document.getElementById('searchDate').value,
			machineId: document.getElementById('searchMachine').value,
			operatorId: document.getElementById('searchOperator').value,
		};

		google.script.run
			.withSuccessHandler(renderSearchResults)
			.withFailureHandler(function (err) {
				alert(err.message);
			})
			.searchProductionEntries(criteria);
	}

	function renderSearchResults(results) {
		results = results || [];

		const container = document.getElementById('searchResultsContainer');

		if (results.length === 0) {
			container.innerHTML =
				"<div class='empty'>No matching records found.</div>";

			return;
		}

		let html = `
        <table class="search-table">

            <thead>

                <tr>

                    <th>Entry ID</th>

                    <th>Date</th>

                    <th>Machine</th>

                    <th>Operator</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody>
    `;

		results.forEach(function (item) {
			html += `

            <tr>

                <td>${item.entryId}</td>

                <td>${formatSearchDate(item.date)}</td>

                <td>${item.machineName}</td>

                <td>${item.operatorName}</td>

                <td>

                    <button
                        class="primary-btn"
                        onclick="editProductionEntry('${item.entryId}')">

                        Edit

                    </button>

										<button
												class="delete-btn"
												onclick="confirmDeleteProduction('${item.entryId}')">
												Delete
										</button>

                </td>

            </tr>

        `;
		});

		html += '</tbody></table>';

		container.innerHTML = html;
	}

	function formatSearchDate(value) {
		if (!value) return '';
		const d = new Date(value);
		return d.toLocaleDateString('en-GB');
	}

	function editProductionEntry(entryId) {
		google.script.run
			.withSuccessHandler(loadProductionForEdit)
			.withFailureHandler(function (err) {
				alert(err.message);
			})
			.getProductionEntry(entryId);
	}

	function clearSearch() {
		document.getElementById('searchEntryId').value = '';

		document.getElementById('searchDate').value = '';

		document.getElementById('searchMachine').selectedIndex = 0;

		document.getElementById('searchOperator').selectedIndex = 0;

		document.getElementById('searchResultsContainer').innerHTML =
			'No records searched.';
	}

	/**
	 * -----------------------------------------------------------
	 * Confirmation
	 * -----------------------------------------------------------
	 */
	function showConfirmation(data, submitButton) {
		const totalDies = data.products.reduce(
			(sum, product) => sum + Number(product.mould || 0),
			0,
		);
		let message = '';

		message += 'Please confirm production\n\n';

		message += 'Date : ' + data.date + '\n';
		message += 'Machine : ' + data.machineName + '\n';
		message += 'Operator : ' + data.operatorName + '\n';
		message += 'Bags : ' + data.bags + '\n';
		message += 'Rounds : ' + data.rounds + '\n';
		message += 'Total Dies : ' + totalDies + '\n\n';

		message += 'Running Products\n';
		message += '--------------------------\n';

		data.products.forEach((product) => {
			message += product.productName + ' (Mould ' + product.mould + ')\n';
		});

		const confirmed = confirm(message);

		if (!confirmed) {
			return;
		}

		submitButton.disabled = true;

		submitButton.textContent = 'Saving...';

		google.script.run
			.withSuccessHandler((response) =>
				onProductionSubmitted(response, submitButton),
			)
			.withFailureHandler(function (err) {
				submitButton.disabled = false;
				submitButton.textContent = 'Submit';
				alert(err.message);
			})
			.submitProduction(data);
	}

	function onProductionSubmitted(response, submitButton) {
		submitButton.disabled = false;
		submitButton.textContent = 'Submit';

		if (response.duplicate) {
			alert(response.message);

			return;
		}

		if (response.success) {
			alert(
				'Production submitted successfully.\n\nEntry ID : ' + response.entryId,
			);

			resetProductionForm();

			return;
		}

		alert('Unknown error.');
	}

	/**
	 * ===========================================================
	 * Machine Setup
	 * ===========================================================
	 */

	function initializeMachineSetup() {
		loadMachineSetup();

		document
			.getElementById('setupMachineSelect')
			.addEventListener('change', onSetupMachineChanged);

		document
			.getElementById('addConfigRowBtn')
			.addEventListener('click', addConfigurationRow);

		document
			.getElementById('resetConfigBtn')
			.addEventListener('click', onSetupMachineChanged);

		document
			.getElementById('saveConfigBtn')
			.addEventListener('click', onSaveConfiguration);
	}

	function loadMachineSetup() {
		google.script.run
			.withSuccessHandler(function (data) {
				setupMachines = data.machines;
				setupProducts = data.products;
				populateSetupMachines();
			})
			.getMachineSetupData();
	}

	function populateSetupMachines() {
		const dropdown = document.getElementById('setupMachineSelect');

		dropdown.innerHTML = '';

		const option = document.createElement('option');

		option.value = '';

		option.textContent = 'Select Machine';

		dropdown.appendChild(option);

		setupMachines.forEach((machine) => {
			const opt = document.createElement('option');

			opt.value = machine.id;

			opt.textContent = machine.name;

			dropdown.appendChild(opt);
		});
	}

	function onSetupMachineChanged() {
		const machineId = document.getElementById('setupMachineSelect').value;

		if (machineId) {
			google.script.run
				.withSuccessHandler(renderConfigurationTable)
				.getMachineConfigurationForEdit(machineId);
		} else {
			clearConfigurationTable();
		}
	}

	function onSaveConfiguration() {
		const machineId = document.getElementById('setupMachineSelect').value;

		if (machineId === '') {
			alert('Please select a machine.');

			return;
		}

		let changeSet;

		try {
			changeSet = buildConfigurationChanges();
		} catch (err) {
			alert(err.message);
			return;
		}

		google.script.run
			.withSuccessHandler(function () {
				alert('Configuration saved successfully.');

				onSetupMachineChanged.call({
					value: machineId,
				});
			})
			.withFailureHandler(function (err) {
				alert(err.message);
			})
			.saveMachineConfiguration(machineId, changeSet);
	}

	function renderConfigurationTable(config) {
		setupConfiguration = JSON.parse(JSON.stringify(config));

		const tbody = document.querySelector('#machineConfigTable tbody');

		tbody.innerHTML = '';

		if (config.length === 0) {
			clearConfigurationTable();

			return;
		}

		config.forEach((item) => {
			tbody.appendChild(createConfigurationRow(item));
		});
	}

	function createConfigurationRow(item) {
		const tr = document.createElement('tr');

		/*
    ------------------------
    Product
    ------------------------
    */

		const tdProduct = document.createElement('td');

		const productSelect = document.createElement('select');

		setupProducts.forEach((product) => {
			const option = document.createElement('option');

			option.value = product.id;

			option.textContent = product.name;

			if (product.id === item.productId) {
				option.selected = true;
			}

			productSelect.appendChild(option);
		});

		tdProduct.appendChild(productSelect);

		/*
    ------------------------
    Mould
    ------------------------
    */

		const tdMould = document.createElement('td');

		const mouldInput = document.createElement('input');

		mouldInput.type = 'number';

		mouldInput.min = '1';

		mouldInput.value = item.mould || '';

		tdMould.appendChild(mouldInput);

		/*
    ------------------------
    Delete
    ------------------------
    */

		const tdAction = document.createElement('td');

		const deleteButton = document.createElement('button');

		deleteButton.type = 'button';

		deleteButton.textContent = 'Delete';

		deleteButton.className = 'secondary-btn';

		deleteButton.style.height = '30px';

		deleteButton.style.fontSize = '12px';

		deleteButton.addEventListener('click', function () {
			tr.remove();

			const tbody = document.querySelector('#machineConfigTable tbody');

			if (tbody.children.length === 0) {
				clearConfigurationTable();
			}
		});

		tdAction.appendChild(deleteButton);

		tr.appendChild(tdProduct);
		tr.appendChild(tdMould);
		tr.appendChild(tdAction);

		return tr;
	}

	function addConfigurationRow() {
		const tbody = document.querySelector('#machineConfigTable tbody');

		if (tbody.querySelector('.empty')) {
			tbody.innerHTML = '';
		}

		tbody.appendChild(
			createConfigurationRow({
				productId: '',

				mould: '',
			}),
		);
	}

	function clearConfigurationTable() {
		document.querySelector('#machineConfigTable tbody').innerHTML = `
        <tr>
            <td colspan="3" class="empty">
                Select a machine
            </td>
        </tr>
    `;
	}

	function getCurrentConfiguration() {
		const rows = document.querySelectorAll('#machineConfigTable tbody tr');

		const configuration = [];

		rows.forEach((row) => {
			if (row.querySelector('.empty')) {
				return;
			}

			configuration.push({
				productId: row.cells[0].querySelector('select').value,
				mould: Number(row.cells[1].querySelector('input').value),
			});
		});

		return configuration;
	}

	function buildConfigurationChanges() {
		const current = getCurrentConfiguration();

		const originalMap = {};
		const currentMap = {};

		const changeSet = {
			added: [],
			removed: [],
			updated: [],
		};

		/*
    --------------------------------------
    Build Original Map
    --------------------------------------
    */

		setupConfiguration.forEach((item) => {
			if (originalMap[item.productId]) {
				throw new Error('Duplicate product found in existing configuration.');
			}

			originalMap[item.productId] = Number(item.mould);
		});

		/*
    --------------------------------------
    Build Current Map
    --------------------------------------
    */

		current.forEach((item) => {
			if (!item.productId) {
				throw new Error('Please select a product in every row.');
			}

			if (!item.mould || item.mould <= 0) {
				throw new Error('Invalid mould count.');
			}

			if (currentMap[item.productId]) {
				throw new Error('Duplicate product found in machine configuration.');
			}

			currentMap[item.productId] = Number(item.mould);
		});

		/*
    --------------------------------------
    Removed
    --------------------------------------
    */

		Object.keys(originalMap).forEach((productId) => {
			if (!(productId in currentMap)) {
				changeSet.removed.push({
					productId: productId,
					mould: originalMap[productId],
				});
			}
		});

		/*
    --------------------------------------
    Added
    --------------------------------------
    */

		Object.keys(currentMap).forEach((productId) => {
			if (!(productId in originalMap)) {
				changeSet.added.push({
					productId: productId,
					mould: currentMap[productId],
				});
			}
		});

		/*
    --------------------------------------
    Updated
    --------------------------------------
    */

		Object.keys(currentMap).forEach((productId) => {
			if (!(productId in originalMap)) {
				return;
			}

			if (originalMap[productId] !== currentMap[productId]) {
				changeSet.updated.push({
					productId: productId,
					oldMould: originalMap[productId],
					newMould: currentMap[productId],
				});
			}
		});

		return changeSet;
	}

	function confirmDeleteProduction(entryId) {
		const confirmed = confirm(
			`Are you sure you want to delete Production Entry ${entryId}?\n\nThis action cannot be undone.`,
		);

		if (!confirmed) return;

		google.script.run
			.withSuccessHandler(function () {
				alert('Production entry deleted successfully.');

				document.getElementById('searchProductionBtn').click();

				if (editMode && editingEntryId === entryId) {
					resetProductionForm();
				}
			})
			.withFailureHandler(function (err) {
				alert(err.message);
			})
			.deleteProduction(entryId);
	}
</script>
