<div id="production-page" class="page">
	<div class="section">
		<label>Date</label>
		<input type="date" id="prodDate" />
	</div>

	<div class="section">
		<label>Machine</label>
		<select id="machineSelect">
			<option value="">Loading...</option>
		</select>
	</div>

	<div class="section">
		<label>Operator</label>
		<select id="operatorSelect">
			<option value="">Select Operator</option>
		</select>
	</div>

	<div class="section">
		<label>Bags Consumed</label>
		<input type="number" id="bags" min="0" step="0.5" placeholder="0" />
	</div>

	<div class="section">
		<label>Rounds</label>
		<input type="number" id="rounds" min="0" step="1" placeholder="0" />
	</div>

	<div class="section">
		<div class="section-title">Running Products</div>

		<table id="runningProductsTable">
			<thead>
				<tr>
					<th>Product</th>

					<th>Mould</th>
				</tr>
			</thead>

			<tbody>
				<tr>
					<td colspan="2" class="empty">Select a machine</td>
				</tr>
			</tbody>
		</table>
	</div>

	<div class="button-container">
		<button id="submitProductionBtn" class="primary-btn">Submit</button>

		<button id="resetProductionBtn" class="secondary-btn">Reset</button>
	</div>
</div>
