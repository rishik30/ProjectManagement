<div id="production-page" class="page">
	<!-- ===================================================== -->
	<!-- Search Production -->
	<!-- ===================================================== -->

	<div id="productionSearchSection" class="section">
		<div class="section-title">Search Production</div>

		<div class="section">
			<label>Entry ID</label>
			<input type="text" id="searchEntryId" />
		</div>

		<div class="section">
			<label>Date</label>
			<input type="date" id="searchDate" />
		</div>

		<div class="section">
			<label>Machine</label>

			<select id="searchMachine">
				<option value="">All Machines</option>
			</select>
		</div>

		<div class="section">
			<label>Operator</label>

			<select id="searchOperator">
				<option value="">All Operators</option>
			</select>
		</div>

		<div class="button-container">
			<button id="searchProductionBtn" class="primary-btn">Search</button>

			<button id="clearSearchBtn" class="secondary-btn">Clear</button>
		</div>
	</div>

	<hr />

	<!-- ===================================================== -->
	<!-- Search Results -->
	<!-- ===================================================== -->

	<div id="searchResultsSection" class="section">
		<div class="section-title">Search Results</div>

		<div id="searchResultsContainer">No records searched.</div>
	</div>

	<hr />
	<div class="section">
		<label>Date</label>
		<input type="date" id="prodDate" />
	</div>

	<div class="section">
		<label>Machine</label>
		<select id="machineSelect">
			<option value="">Loading...</option>
		</select>
	</div>

	<div class="section">
		<label>Operator</label>
		<select id="operatorSelect">
			<option value="">Select Operator</option>
		</select>
	</div>

	<div class="section">
		<label>Bags Consumed</label>
		<input type="number" id="bags" min="0" step="0.5" placeholder="0" />
	</div>

	<div class="section">
		<label>Rounds</label>
		<input type="number" id="rounds" min="0" step="1" placeholder="0" />
	</div>

	<div class="section">
		<div class="section-title">Running Products</div>

		<table id="runningProductsTable">
			<thead>
				<tr>
					<th>Product</th>

					<th>Mould</th>
				</tr>
			</thead>

			<tbody>
				<tr>
					<td colspan="2" class="empty">Select a machine</td>
				</tr>
			</tbody>
		</table>
	</div>

	<div class="button-container">
		<button id="submitProductionBtn" class="primary-btn">Submit</button>

		<button id="resetProductionBtn" class="secondary-btn">Reset</button>
	</div>
</div>
